<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#0a0a0a"/>
  <!-- Mountain -->
  <polygon points="50,10 88,70 12,70" fill="#ff6200"/>
  <!-- Snow cap -->
  <polygon points="50,10 63,40 37,40" fill="#141414"/>
  <!-- Bike wheels -->
  <circle cx="33" cy="83" r="10" fill="none" stroke="#ff6200" stroke-width="3.5"/>
  <circle cx="67" cy="83" r="10" fill="none" stroke="#ff6200" stroke-width="3.5"/>
  <!-- Bike frame -->
  <line x1="33" y1="73" x2="50" y2="60" stroke="#ff6200" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="50" y1="60" x2="67" y2="73" stroke="#ff6200" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="50" y1="60" x2="53" y2="73" stroke="#ff6200" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Hub dots -->
  <circle cx="33" cy="83" r="3" fill="#ff6200"/>
  <circle cx="67" cy="83" r="3" fill="#ff6200"/>
</svg>
